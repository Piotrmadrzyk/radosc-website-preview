name: Deploy GitHub Pages

on:
  push:
    branches:
      - preview/redesign-2026
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Skonfiguruj GitHub Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Prześlij artefakt strony
        uses: actions/upload-pages-artifact@v3
        with:
          # strona jest czystym HTML/CSS/JS — publikujemy katalog repozytorium
          path: .

      - name: Wdróż na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
